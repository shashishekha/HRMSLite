upstream django {
    server backend:8000;
}

upstream react {
    server frontend:80;
}

server {
    listen 80;

    location /api/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /admin/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
    }

    location /static/ {
        proxy_pass http://django;
    }

    location / {
        proxy_pass http://react;
        proxy_set_header Host $host;
    }
}